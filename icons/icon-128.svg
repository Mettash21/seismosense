    stroke-linecap="round" 
    stroke-linejoin="round"
  />
  
  <!-- Center dot -->
  <circle cx="64" cy="64" r="5.12" fill="#e74c3c"/>
  <circle cx="64" cy="64" r="3.2" fill="#ff6b6b"/>
