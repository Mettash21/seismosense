      <stop offset="0%" stop-color="#0f1830"/>
      <stop offset="100%" stop-color="#060a14"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3d8bff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3d8bff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="128" height="128" rx="23.04" fill="url(#bg)"/>
  
  <!-- Glow -->
  <circle cx="64" cy="64" r="57.6" fill="url(#glow)"/>
  
  <!-- Outer ring -->
  <circle cx="64" cy="64" r="57.6" fill="none" stroke="#1e2d4a" stroke-width="3.2"/>
  
  <!-- Inner ring -->
  <circle cx="64" cy="64" r="43.2" fill="none" stroke="#1e2d4a" stroke-width="1.536" stroke-dasharray="7.68 5.12"/>
  
  <!-- Seismic wave -->
  <polyline 
    points="15.36,64 32,64 42.24,22.4 52.48,105.6 62.72,35.2 72.96,86.4 83.2,64 98.56,64 106.24,32 112.64,64"
    fill="none" 
